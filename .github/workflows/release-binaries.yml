name: Build and Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            architecture: x64
            app_name: Talk to Text
            archive_name: talk-to-text-windows-x64.zip
          - os: macos-13
            target: macos-x64
            architecture: x64
            app_name: Talk to Text
            archive_name: talk-to-text-macos-x64.zip
          - os: macos-14
            target: macos-arm64
            architecture: arm64
            app_name: Talk to Text
            archive_name: talk-to-text-macos-arm64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.architecture }}
          cache: "pipenv"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pipenv install --system --deploy
          pip install pyinstaller

      - name: Build desktop app package
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          pyinstaller --noconfirm --clean --windowed --name "${{ matrix.app_name }}" \
            --add-data "files/talk-to-text-icon.png${SEP}files" \
            --icon "files/talk-to-text-icon.png" \
            transcriber/ui_app.py

      - name: Verify app package exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/${{ matrix.app_name }}/${{ matrix.app_name }}.exe")) {
            throw "Expected app dist/${{ matrix.app_name }}/${{ matrix.app_name }}.exe was not generated."
          }

      - name: Verify app bundle exists (macOS)
        if: runner.os != 'Windows'
        run: test -d "dist/${{ matrix.app_name }}.app"

      - name: Package app folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.app_name }}" -DestinationPath "dist/${{ matrix.archive_name }}"

      - name: Package app bundle (macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "${{ matrix.app_name }}.app" "${{ matrix.archive_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.archive_name }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.zip
          generate_release_notes: true
          overwrite_files: true
